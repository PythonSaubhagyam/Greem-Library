{% if breadcrumbs %}
<nav aria-label="breadcrumb"
     class="breadcrumb-container px-3 py-2 bg-lighter border-bottom"
     style="overflow-x: auto; white-space: nowrap; scrollbar-width: thin; -webkit-overflow-scrolling: touch;">
  <ol class="breadcrumb mb-0 d-inline-flex align-items-center flex-nowrap" style="gap: 0.25rem;">
    {% for crumb in breadcrumbs %}
      <li class="breadcrumb-item {% if forloop.last %}active{% endif %}"
          {% if forloop.last %}aria-current="page"{% endif %}
          style="flex-shrink: 0;">
        {% if crumb.url and not forloop.last %}
          <a href="{{ crumb.url }}" class="text-decoration-none text-primary d-inline-block">
            {{ crumb.label }}
          </a>
        {% else %}
          <span class="text-muted d-inline-block">{{ crumb.label }}</span>
        {% endif %}
      </li>
    {% endfor %}
  </ol>
</nav>
{% endif %}
