{% extends layout_path %}
{% load static %}
{% block title %}Homework Reports{% endblock %}

{% block content %}
<div class="container-xxl flex-grow-1 container-p-y">

  <div class="card mb-4">
    <div class="card-body d-flex justify-content-between align-items-center">
      <h4 class="mb-0">Homework Reports</h4>
      <div>
        <button class="btn btn-sm btn-outline-secondary" id="refreshBtn">Refresh</button>
        <a id="addHomeworkBtn" href="/customer/dashboard/homework/add/" class="btn btn-sm btn-primary">Add Homework</a>
      </div>
    </div>
  </div>

  <div class="row mb-4">
    <div class="col-md-3">
      <div class="card text-center">
        <div class="card-body">
          <h6>Assigned</h6>
          <h3 id="stat-assigned">0</h3>
        </div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card text-center">
        <div class="card-body">
          <h6>Submitted</h6>
          <h3 id="stat-submitted">0</h3>
        </div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card text-center">
        <div class="card-body">
          <h6>Pending</h6>
          <h3 id="stat-pending">0</h3>
        </div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card text-center">
        <div class="card-body">
          <h6>Checked</h6>
          <h3 id="stat-checked">0</h3>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-hover">
          <thead class="table-light">
            <tr>
              <th>#</th>
              <th>Title</th>
              <th>Due</th>
              <th>Assigned To</th>
              <th>Submissions</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="homework-list"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- ── View Submissions Modal ─────────────────────────── -->
<div class="modal fade" id="submissionsModal" tabindex="-1" aria-labelledby="submissionsModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title" id="submissionsModalLabel">Submissions</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="submissionsModalBody">
        <div class="text-center py-4"><div class="spinner-border text-primary"></div></div>
      </div>
    </div>
  </div>
</div>

<!-- ── Homework Detail Modal ──────────────────────────── -->
<div class="modal fade" id="homeworkDetailModal" tabindex="-1" aria-labelledby="homeworkDetailModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title" id="homeworkDetailModalLabel">Homework Detail</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="homeworkDetailModalBody">
        <div class="text-center py-4"><div class="spinner-border text-primary"></div></div>
      </div>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {

  /* ── helpers ─────────────────────────────────────────── */
  function fmtDate(raw) {
    if (!raw) return '-';
    const d = new Date(raw);
    return isNaN(d) ? raw : d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  function spinnerHtml() {
    return '<div class="text-center py-4"><div class="spinner-border text-primary"></div></div>';
  }

  /* ── stats ───────────────────────────────────────────── */
  function loadStats() {
    fetch('/administrator/homework/dashboard/')
      .then(r => r.json())
      .then(data => {
        document.getElementById('stat-assigned').innerText  = data.assigned  ?? 0;
        document.getElementById('stat-submitted').innerText = data.submitted ?? 0;
        document.getElementById('stat-pending').innerText   = data.pending   ?? 0;
        document.getElementById('stat-checked').innerText   = data.checked   ?? 0;
      })
      .catch(() => {});
  }

  /* ── list ────────────────────────────────────────────── */
  function loadList() {
    fetch('/administrator/homework/?page=1&row_per_page=50')
      .then(r => r.json())
      .then(data => {
        const tbody = document.getElementById('homework-list');
        tbody.innerHTML = '';

        if (!data.results || data.results.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-3">No homework found</td></tr>';
          return;
        }

        data.results.forEach((h, i) => {
          const assignedTo = (h.students && h.students.length)
            ? h.students.map(s => s.student_name).join(', ')
            : (h.target_class || '-');

          const row = `
            <tr>
              <td>${i + 1}</td>
              <td>${h.title}</td>
              <td>${fmtDate(h.due_date)}</td>
              <td>${assignedTo}</td>
              <td>
                <button class="btn btn-sm btn-outline-info"
                        onclick="openSubmissions(${h.id}, '${h.title.replace(/'/g, "\\'")}')">
                  View
                </button>
              </td>
              <td>
                <button class="btn btn-sm btn-outline-primary"
                        onclick="openDetail(${h.id}, '${h.title.replace(/'/g, "\\'")}')">
                  Open
                </button>
              </td>
            </tr>`;
          tbody.insertAdjacentHTML('beforeend', row);
        });
      })
      .catch(() => {
        document.getElementById('homework-list').innerHTML =
          '<tr><td colspan="6" class="text-center text-danger">Failed to load</td></tr>';
      });
  }

  /* ── View submissions modal ──────────────────────────── */
  window.openSubmissions = function (hwId, title) {
    const modal = new bootstrap.Modal(document.getElementById('submissionsModal'));
    document.getElementById('submissionsModalLabel').textContent = 'Submissions — ' + title;
    document.getElementById('submissionsModalBody').innerHTML = spinnerHtml();
    modal.show();

    fetch(`/administrator/homework/submissions/?homework_id=${hwId}`)
      .then(r => r.json())
      .then(data => {
        const results = data.results || data;    // handle both paginated and plain list
        if (!results.length) {
          document.getElementById('submissionsModalBody').innerHTML =
            '<p class="text-muted text-center">No submissions yet.</p>';
          return;
        }
        let rows = results.map(s => `
          <tr>
            <td>${s.student?.student_name || s.student_name || '-'}</td>
            <td>${fmtDate(s.submitted_at)}</td>
            <td>${s.score !== null && s.score !== undefined ? s.score : '-'}</td>
            <td>${s.remarks || '-'}</td>
          </tr>`).join('');

        document.getElementById('submissionsModalBody').innerHTML = `
          <table class="table table-sm table-hover">
            <thead class="table-light">
              <tr><th>Student</th><th>Submitted</th><th>Score</th><th>Remarks</th></tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>`;
      })
      .catch(() => {
        document.getElementById('submissionsModalBody').innerHTML =
          '<p class="text-danger text-center">Failed to load submissions.</p>';
      });
  };

  /* ── Open detail modal ───────────────────────────────── */
  window.openDetail = function (hwId, title) {
    const modal = new bootstrap.Modal(document.getElementById('homeworkDetailModal'));
    document.getElementById('homeworkDetailModalLabel').textContent = title;
    document.getElementById('homeworkDetailModalBody').innerHTML = spinnerHtml();
    modal.show();

    fetch(`/administrator/homework/${hwId}/`)
      .then(r => r.json())
      .then(h => {
        const assignedTo = (h.students && h.students.length)
          ? h.students.map(s => s.student_name).join(', ')
          : (h.target_class || '-');

        document.getElementById('homeworkDetailModalBody').innerHTML = `
          <dl class="row mb-0">
            <dt class="col-sm-4">Title</dt>
            <dd class="col-sm-8">${h.title}</dd>

            <dt class="col-sm-4">Description</dt>
            <dd class="col-sm-8">${h.description || '-'}</dd>

            <dt class="col-sm-4">Due Date</dt>
            <dd class="col-sm-8">${fmtDate(h.due_date)}</dd>

            <dt class="col-sm-4">Assigned To</dt>
            <dd class="col-sm-8">${assignedTo}</dd>

            <dt class="col-sm-4">Created</dt>
            <dd class="col-sm-8">${fmtDate(h.created_at)}</dd>
          </dl>`;
      })
      .catch(() => {
        document.getElementById('homeworkDetailModalBody').innerHTML =
          '<p class="text-danger text-center">Failed to load homework detail.</p>';
      });
  };

  /* ── init ────────────────────────────────────────────── */
  try {
    const addBtn = document.getElementById('addHomeworkBtn');
    if (addBtn && window.location.pathname.includes('/customer/dashboard')) {
      const next = '/customer/dashboard/homework/';
      addBtn.href = addBtn.href.split('?')[0] + '?next=' + encodeURIComponent(next);
    }
  } catch (e) {}

  document.getElementById('refreshBtn').addEventListener('click', () => { loadStats(); loadList(); });
  loadStats();
  loadList();
});
</script>

{% endblock %}
