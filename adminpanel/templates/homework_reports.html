{% extends layout_path %}
{% load static %}
{% block title %}Homework Reports{% endblock %}

{% block content %}
<div class="container-xxl flex-grow-1 container-p-y">
  <div class="card mb-4">
    <div class="card-body d-flex justify-content-between align-items-center">
      <h4 class="mb-0">Homework Reports</h4>
      <div>
        <button class="btn btn-sm btn-outline-secondary" id="refreshBtn">Refresh</button>
        <a id="addHomeworkBtn" href="/customer/dashboard/homework/add/" class="btn btn-sm btn-primary">Add Homework</a>
      </div>
    </div>
  </div>

  <div class="row mb-4">
    <div class="col-md-3">
      <div class="card text-center">
        <div class="card-body">
          <h6>Assigned</h6>
          <h3 id="stat-assigned">0</h3>
        </div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card text-center">
        <div class="card-body">
          <h6>Submitted</h6>
          <h3 id="stat-submitted">0</h3>
        </div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card text-center">
        <div class="card-body">
          <h6>Pending</h6>
          <h3 id="stat-pending">0</h3>
        </div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card text-center">
        <div class="card-body">
          <h6>Checked</h6>
          <h3 id="stat-checked">0</h3>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-hover">
          <thead class="table-light">
            <tr>
              <th>#</th>
              <th>Title</th>
              <th>Due</th>
              <th>Assigned To</th>
              <th>Submissions</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="homework-list"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function(){
  // If this reports page is rendered under customer dashboard, ensure Add Homework link redirects back
  try{
    const addBtn = document.getElementById('addHomeworkBtn');
    if(addBtn && window.location.pathname.includes('/customer/dashboard')){
      // set next param so the add page returns to customer dashboard
      const next = '/customer/dashboard/homework/';
      addBtn.href = addBtn.href.split('?')[0] + '?next=' + encodeURIComponent(next);
    }
  }catch(e){/* ignore */}
  function loadStats(){
    fetch('/administrator/homework/dashboard/')
      .then(r=>r.json()).then(data=>{
        document.getElementById('stat-assigned').innerText = data.assigned;
        document.getElementById('stat-submitted').innerText = data.submitted;
        document.getElementById('stat-pending').innerText = data.pending;
        document.getElementById('stat-checked').innerText = data.checked;
      });
  }

  function loadList(){
    fetch('/administrator/homework/?page=1&row_per_page=50')
      .then(r=>r.json()).then(data=>{
        const tbody = document.getElementById('homework-list');
        tbody.innerHTML = '';
        data.results.forEach((h,i)=>{
          const assignedTo = h.students.length ? h.students.map(s=>s.student_name).join(', ') : (h.target_class||'-');
          const row = `\n            <tr>\n              <td>${i+1}</td>\n              <td>${h.title}</td>\n              <td>${h.due_date||'-'}</td>\n              <td>${assignedTo}</td>\n              <td><a href="/administrator/homework/submissions/?homework_id=${h.id}">View</a></td>\n              <td><a href="/administrator/homework/${h.id}/">Open</a></td>\n            </tr>\n          `;
          tbody.insertAdjacentHTML('beforeend', row);
        });
      });
  }

  document.getElementById('refreshBtn').addEventListener('click', ()=>{ loadStats(); loadList(); });
  loadStats(); loadList();
});
</script>
{% endblock %}
