{% extends layout_path %}
{% load static %}
{% block title %}Tests{% endblock %}

{% block content %}
<div class="container-xxl flex-grow-1 container-p-y">
  <div class="card mb-4">
    <div class="card-body d-flex justify-content-between align-items-center">
      <h4 class="mb-0">Tests</h4>
      <div>
        <a id="addTestBtn" href="/administrator/tests/add/" class="btn btn-sm btn-primary">Add Test</a>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-hover">
          <thead class="table-light">
            <tr>
              <th>#</th>
              <th>Title</th>
              <th>Subject</th>
              <th>Due</th>
              <th>Assigned To</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="tests-list"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function(){
  // If this page is rendered under customer dashboard, update Add Test link
  try{
    const addBtn = document.getElementById('addTestBtn');
    if(addBtn && window.location.pathname.includes('/customer/dashboard')){
      addBtn.href = '/customer/dashboard/tests/add/?next=' + encodeURIComponent('/customer/dashboard/tests/');
    }
  }catch(e){/* ignore */}

// Fetch tests via the correct API endpoint
function loadTests(){
  const endpoints = [
    '/administrator/tests-api/?page=1&row_per_page=50'
  ];

  const tbody = document.getElementById('tests-list');
  tbody.innerHTML = '<tr><td colspan="6">Loading...</td></tr>';

  function tryNext(i){
    if(i>=endpoints.length){ tbody.innerHTML = '<tr><td colspan="6">No tests found</td></tr>'; return; }
    fetch(endpoints[i])
      .then(r=>r.json())
      .then(data=>{
        if(data && data.results){
          tbody.innerHTML='';
          data.results.forEach((t,i)=>{
            const detailUrl = window.location.pathname.includes('/customer/dashboard')
              ? `/customer/dashboard/tests/${t.id}/`
              : `/administrator/tests/${t.id}/`;
            const row = `<tr>\n<td>${i+1}</td><td>${t.title}</td><td>${t.subject_name||'-'}</td><td>${t.scheduled_date||'-'}</td><td>${t.students_count||0}</td><td><a href='${detailUrl}'>Open</a></td></tr>`;
            tbody.insertAdjacentHTML('beforeend', row);
          });
        } else {
          tryNext(i+1);
        }
      }).catch(()=> tryNext(i+1));
  }
  tryNext(0);
}

loadTests();
});
</script>
{% endblock %}
