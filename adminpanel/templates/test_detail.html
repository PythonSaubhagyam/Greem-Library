{% extends layout_path %}
{% load static %}
{% block title %}Test Details{% endblock %}

{% block content %}
<div class="container-xxl flex-grow-1 container-p-y">
  <div class="card mb-4">
    <div class="card-body d-flex justify-content-between align-items-center">
      <h4 class="mb-0" id="testTitle">Test Details</h4>
      <div>
        <a href="/administrator/tests/" class="btn btn-sm btn-outline-secondary">Back</a>
      </div>
    </div>
  </div>

  <div class="row">
    <!-- Test Info -->
    <div class="col-md-6">
      <div class="card mb-4">
        <div class="card-header">
          <h5 class="mb-0">Test Information</h5>
        </div>
        <div class="card-body">
          <div class="mb-3">
            <label class="form-label">Title:</label>
            <p id="title" class="form-control-plaintext"></p>
          </div>
          <div class="mb-3">
            <label class="form-label">Subject:</label>
            <p id="subject" class="form-control-plaintext"></p>
          </div>
          <div class="mb-3">
            <label class="form-label">Question Type:</label>
            <p id="question_type" class="form-control-plaintext"></p>
          </div>
          <div class="mb-3">
            <label class="form-label">Number of Questions:</label>
            <p id="number_of_questions" class="form-control-plaintext"></p>
          </div>
          <div class="mb-3">
            <label class="form-label">Total Marks:</label>
            <p id="total_marks" class="form-control-plaintext"></p>
          </div>
          <div class="mb-3">
            <label class="form-label">Duration (minutes):</label>
            <p id="duration_minutes" class="form-control-plaintext"></p>
          </div>
          <div class="mb-3">
            <label class="form-label">Scheduled Date:</label>
            <p id="scheduled_date" class="form-control-plaintext"></p>
          </div>
          <div class="mb-3">
            <label class="form-label">Created By:</label>
            <p id="created_by_name" class="form-control-plaintext"></p>
          </div>
          <div class="mb-3">
            <label class="form-label">Shuffle Questions:</label>
            <p id="shuffle_questions" class="form-control-plaintext"></p>
          </div>
          <div class="mb-3">
            <label class="form-label">Enable Timer:</label>
            <p id="enable_timer" class="form-control-plaintext"></p>
          </div>
          <div class="mb-3">
            <label class="form-label">Students Assigned:</label>
            <p id="students_count" class="form-control-plaintext"></p>
          </div>
        </div>
      </div>
    </div>

    <!-- Questions Section -->
    <div class="col-md-6">
      <div class="card">
        <div class="card-header">
          <h5 class="mb-0">Questions</h5>
        </div>
        <div class="card-body">
          <div id="questions-list" style="max-height: 500px; overflow-y: auto;">
            <p class="text-center text-muted">Loading questions...</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block page_js %}
<script>
// Get test ID from URL
const pathParts = window.location.pathname.split('/').filter(p => p);
const testId = pathParts[pathParts.length - 2];

// Load test details
function loadTestDetails(){
  fetch(`/administrator/tests-api/${testId}/`)
    .then(r=>r.json())
    .then(data=>{
      document.getElementById('testTitle').innerText = data.title;
      document.getElementById('title').innerText = data.title;
      document.getElementById('subject').innerText = data.subject_name || '-';
      document.getElementById('question_type').innerText = data.question_type || '-';
      document.getElementById('number_of_questions').innerText = data.number_of_questions || 0;
      document.getElementById('total_marks').innerText = data.total_marks || 0;
      document.getElementById('duration_minutes').innerText = (data.duration_minutes || 0) + ' min';
      document.getElementById('scheduled_date').innerText = data.scheduled_date
        ? new Date(data.scheduled_date).toLocaleString()
        : '-';
      document.getElementById('created_by_name').innerText = data.created_by_name || '-';
      document.getElementById('shuffle_questions').innerText = data.shuffle_questions ? 'Yes' : 'No';
      document.getElementById('enable_timer').innerText = data.enable_timer ? 'Yes' : 'No';
      document.getElementById('students_count').innerText = data.students_count || 0;

      // Load questions
      if(data.questions && data.questions.length > 0){
        const questionsList = document.getElementById('questions-list');
        questionsList.innerHTML = '';
        data.questions.forEach((q, idx)=>{
          const optionsHtml = (q.options || []).map(opt =>
            `<li>${opt.option_text} ${opt.is_correct ? '<span class="badge bg-success">Correct</span>' : ''}</li>`
          ).join('');
          const qHtml = `
            <div class="mb-3 p-3 border rounded">
              <h6>Q${idx+1}. ${q.question_text}</h6>
              <p class="text-muted">Marks: ${q.marks}</p>
              ${optionsHtml ? `<ul>${optionsHtml}</ul>` : ''}
            </div>
          `;
          questionsList.insertAdjacentHTML('beforeend', qHtml);
        });
      } else {
        document.getElementById('questions-list').innerHTML = '<p class="text-muted">No questions added yet</p>';
      }
    })
    .catch(err=>{
      console.error('Error loading test:', err);
      document.getElementById('questions-list').innerHTML = '<p class="text-danger">Error loading test details</p>';
    });
}

document.addEventListener('DOMContentLoaded', function(){
  loadTestDetails();
});
</script>
{% endblock %}
