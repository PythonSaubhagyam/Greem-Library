{% extends layout_path %}
{% load static %}
{% block title %}Add Homework{% endblock %}

{% block content %}
<div class="container-xxl flex-grow-1 container-p-y">
  <div class="card mb-4">
    <div class="card-body d-flex justify-content-between align-items-center">
      <h4 class="mb-0">Add Homework</h4>
      <div>
        <a href="/administrator/homework/" class="btn btn-sm btn-outline-secondary">Back</a>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-body">
      <form id="homeworkForm">
        <div class="mb-3">
          <label class="form-label">Title</label>
          <input type="text" id="title" class="form-control" required />
        </div>
        <div class="mb-3">
          <label class="form-label">Description</label>
          <textarea id="description" class="form-control" rows="4"></textarea>
        </div>
        <div class="mb-3">
          <label class="form-label">Due date</label>
          <input type="date" id="due_date" class="form-control" />
        </div>
        <div class="mb-3">
          <button type="submit" class="btn btn-primary">Create Homework</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}

{% block page_js %}
<script>
document.getElementById('homeworkForm').addEventListener('submit', function(e){
  e.preventDefault();
  const payload = {
    title: document.getElementById('title').value,
    description: document.getElementById('description').value,
    due_date: document.getElementById('due_date').value || null
  };

  fetch('/administrator/homework/', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    credentials: 'same-origin',
    body: JSON.stringify(payload)
  }).then(r=>r.json()).then(res=>{
       if(res.data){
         // redirect back to appropriate homework listing depending on where the user came from
         const params = new URLSearchParams(window.location.search);
         const next = params.get('next');
         if (next) {
           window.location.href = next;
           return;
         }
         const isCustomer = window.location.pathname.includes('/customer/dashboard');
         window.location.href = isCustomer ? '/customer/dashboard/homework/' : '/administrator/homework/';
    } else if(res.errors){
      alert('Error: ' + JSON.stringify(res.errors));
    } else {
      alert('Unexpected response');
    }
  }).catch(err=>{ alert('Network error'); console.error(err); });
});
</script>
{% endblock %}
