{% extends layout_path %}
{% load static %}
{% block title %} Add Company {% endblock %}

{% block page_css %}
<style>
  /* Page Background */
  body {
    background-color: #f8f9fa;
  }

  /* Full-page container */
  .add-company-page {
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-height: calc(100vh - 100px);
  }

  /* Card styling */
  .company-card {
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
  }

  /* Form Controls */
  .company-card .form-control,
  .company-card .form-select {
    height: 48px;
    border-radius: 6px;
    font-size: 0.95rem;
  }

  .company-card .btn {
    height: 48px;
    border-radius: 6px;
    font-weight: 500;
  }

  .company-card .form-control:focus {
    border-color: #3b82f6;
    box-shadow: none;
  }

  .company-card .form-control::placeholder {
    color: #999;
  }

  /* Password eye icon */
  .toggle-icon {
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    color: #888;
    cursor: pointer;
  }

  @media (min-width: 768px) {
    .company-card {
      width: 100%;
      max-width: 900px;
      margin: auto;
    }
  }
</style>
{% endblock %}

{% block content %}
<div class="row">
  <!-- Basic Layout -->
  <div class="col-xxl">
    <div class="card mb-5">
      <div
        class="card-header d-flex align-items-center justify-content-between p-p-b"
      >
        <h5 class="mb-0" id="pageTitle">Add New Parent</h5>
      </div>
      <div class="card-body">
        <form id="companySignupForm">

          <input type="hidden" id="userId">

          <input type="hidden" id="roleType">


          <div class="row g-3">
            <div class="col-md-6">
              <input type="text" id="companyName" class="form-control" placeholder="Enter Parents Name" required>
            </div>

            <div class="col-md-6">
              <input type="email" id="email" class="form-control" placeholder="Enter Email" required>
            </div>

            <div class="col-md-6 d-flex">
              <select class="form-select me-2" id="countryCode" style="max-width: 100px;">
                <option value="+91">+91</option>
                <option value="+1">+1</option>
                <option value="+44">+44</option>
              </select>
              <input type="text" id="mobile" class="form-control" placeholder="Enter Mobile Number" required>
            </div>

            {% comment %} <div class="col-md-6 position-relative">
              <input type="password" id="password" class="form-control" placeholder="Enter Password" required>
              <i class="bx bx-show toggle-icon" id="togglePassword"></i>
            </div>

            <div class="col-md-6 position-relative">
              <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm Password" required>
              <i class="bx bx-show toggle-icon" id="toggleConfirmPassword"></i>
            </div> {% endcomment %}

            <div class="col-md-6">
              <input type="text" id="address" class="form-control" placeholder="Enter Address">
            </div>

            <div class="col-md-6">
              <select id="country" class="form-select" required>
                <option value="">Select Country</option>
                <option value='India'>India</opiton>
              </select>
            </div>

            <div class="col-md-6">
              <select id="state" class="form-select" required>
                <option value="">Select State</option>
                <option value='Gujarat'>Gujarat</opiton>
              </select>
            </div>

            <div class="col-md-6">
              <select id="city" class="form-select">
                <option value="">Select City</option>
                <option value='Ahmedabad'>Ahmedabad</opiton>
              </select>
            </div> 

            <div class="col-md-6">
              <input type="text" id="zipCode" class="form-control" placeholder="Enter Zip Code">
            </div>

            <div class="col-12 d-flex justify-content-end mt-3">
              <button type="submit" class="btn btn-primary btn me-2" id="submitBtn">Add</button>
              <button type="button" class="btn btn-secondary btn" onclick="window.location.href='/administrator/companies/'; return false;">Cancel</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block page_js %}
<script>
  const urlParams = new URLSearchParams(window.location.search);
  const roleType = urlParams.get("type");
  const editUserId = urlParams.get("id");

  if (roleType) {
    document.getElementById("roleType").value = roleType;
  }

  const pageTitle = document.getElementById("pageTitle");
  const submitBtn = document.getElementById("submitBtn");

  if (roleType === "parent") {
  pageTitle.innerText = "Add Parent";
}

if (roleType === "teacher") {
  pageTitle.innerText = "Add Teacher";
}

if (editUserId) {
  pageTitle.innerText = "Update User";
  submitBtn.innerText = "Update";
  loadUserForEdit(editUserId);
}
document.addEventListener("DOMContentLoaded", function() {
  const csrftoken = document.querySelector('[name=csrfmiddlewaretoken]')?.value;

  // Load Country
function loadCountries() {
  fetch("/countries/", {
    method: "GET",
    headers: { "Content-Type": "application/json", "X-CSRFToken": csrftoken },
  })
  .then(res => res.json())
  .then(data => {
    const countrySelect = document.getElementById("country");
    const countryCodeSelect = document.getElementById("countryCode");

    countrySelect.innerHTML = `<option value="">Select Country</option>`;
    countryCodeSelect.innerHTML = `<option value="">Code</option>`;

    data.data.forEach(c => {
      // Add country dropdown option
      countrySelect.insertAdjacentHTML(
        "beforeend",
        `<option value="${c.id}">${c.country_name}</option>`
      );

      // Add calling code option
      if (c.calling_code) {
        const isDefault = c.calling_code === "91" ? "selected" : "";
        countryCodeSelect.insertAdjacentHTML(
          "beforeend",
          `<option value="${c.calling_code}" ${isDefault}>+${c.calling_code}</option>`
        );
      }
    });
  })
  .catch(err => console.error("Error loading countries:", err));
}

function loadUserForEdit(userId) {
  fetch(`/administrator/companies-list/?id=${userId}`)
    .then(res => res.json())
    .then(data => {
      const user = data.results[0]; // paginated

      document.getElementById("userId").value = user.id;
      document.getElementById("companyName").value = user.first_name;
      document.getElementById("email").value = user.email;
      document.getElementById("mobile").value = user.mobile_no || "";
      document.getElementById("address").value = user.address || "";

      // Disable email in edit mode
      document.getElementById("email").disabled = true;
    })
    .catch(err => console.error("Failed to load user:", err));
}



  document.getElementById("country").addEventListener("change", function() {
    const countryId = this.value;
    if (!countryId) return;
    fetch(`/states/${countryId}/`, {
      method: "GET",
      headers: {"Content-Type": "application/json", "X-CSRFToken": csrftoken},
    })
    .then(res => res.json())
    .then(data => {
      const stateSelect = document.getElementById("state");
      stateSelect.innerHTML = `<option value="">Select State</option>`;
      data.data.forEach(s => {
        stateSelect.insertAdjacentHTML("beforeend", `<option value="${s.id}">${s.name}</option>`);
      });
    });
  });

  document.getElementById("state").addEventListener("change", function() {
    const stateId = this.value;
    if (!stateId) return;
    fetch(`/cities/${stateId}/`, {
      method: "GET",
      headers: {"Content-Type": "application/json", "X-CSRFToken": csrftoken},
    })
    .then(res => res.json())
    .then(data => {
      const citySelect = document.getElementById("city");
      citySelect.innerHTML = `<option value="">Select City</option>`;
      data.data.forEach(c => {
        citySelect.insertAdjacentHTML("beforeend", `<option value="${c.id}">${c.name}</option>`);
      });
    });
  });

  // Password toggle
  function toggleVisibility(id, iconId) {
    const input = document.getElementById(id);
    const icon = document.getElementById(iconId);
    icon.addEventListener("click", () => {
      input.type = input.type === "password" ? "text" : "password";
      icon.classList.toggle("bx-show");
      icon.classList.toggle("bx-hide");
    });
  }
  {% comment %} toggleVisibility("password", "togglePassword");
  toggleVisibility("confirmPassword", "toggleConfirmPassword"); {% endcomment %}

  // Submit Form
  {% comment %} document.getElementById("companySignupForm").addEventListener("submit", function(e) {
    e.preventDefault();
    e.stopPropagation();

    const countrySelect = document.getElementById("country");
    const stateSelect = document.getElementById("state");
    const citySelect = document.getElementById("city");
    const countryCodeSelect = document.getElementById("countryCode");

    // Get selected text, but blank if "Select ..." is chosen
    const countryName = countrySelect.value ? countrySelect.options[countrySelect.selectedIndex].text : "";
    const stateName = stateSelect.value ? stateSelect.options[stateSelect.selectedIndex].text : "";
    const cityName = citySelect.value ? citySelect.options[citySelect.selectedIndex].text : "";

    // Combine country code and mobile number (e.g. +91XXXXXXXXXX)
    const countryCode = countryCodeSelect.value || "";
    const mobileNumber = document.getElementById("mobile").value.trim();
    const fullMobile = countryCode ? `+${countryCode}${mobileNumber}` : mobileNumber;

    const payload = {
      full_name: document.getElementById("companyName").value.trim(),
      email: document.getElementById("email").value.trim(),
      mobile: fullMobile,
      //password: document.getElementById("password").value,
      //confirm_password: document.getElementById("confirmPassword").value,//
      address_line: document.getElementById("address").value.trim(),
      city: cityName,
      state: stateName,
      country: countryName,
      postal_code: document.getElementById("zipCode").value.trim(),
      is_active: true
    };

    console.log("Final Payload Sent:", payload);

    fetch("/auth/signup/", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-CSRFToken": csrftoken
      },
      body: JSON.stringify(payload)
    })
    .then(res => res.json())
    .then(data => {
      console.log("Signup response:", data);
      if (data.status === true || data.status === "true" || data.status === "success") {
        setTimeout(() => {
          window.location.href = "/administrator/companies/";
        }, 500);
      } else {
        alert("Error: " + (data.message || "Failed to register"));
      }
    })
    .catch(err => console.error("Error submitting form:", err));
  }); {% endcomment %}

  
  document.getElementById("companySignupForm").addEventListener("submit", function (e) {
  e.preventDefault();

  const userId = document.getElementById("userId").value;

  const payload = {
    first_name: document.getElementById("companyName").value.trim(),
    email: document.getElementById("email").value.trim(),
    mobile_no: document.getElementById("mobile").value.trim(),
    address_line: document.getElementById("address").value.trim(),
    is_active: true
  };

  if (!userId && roleType) {
    payload.role_type = roleType; // parent / teacher
  }

  // Only send password on ADD
  //if (!userId) {
    //payload.password = document.getElementById("password").value;
    //payload.confirm_password = document.getElementById("confirmPassword").value;
  //}

  const url = userId
    ? `/administrator/companies-list/${userId}/`
    : `/administrator/companies-list/`;

  const method = userId ? "PATCH" : "POST";

  fetch(url, {
    method: method,
    headers: {
      "Content-Type": "application/json",
      "X-CSRFToken": csrftoken
    },
    body: JSON.stringify(payload)
  })
  .then(res => res.json())
  .then(data => {
    if (data.message) {
      window.location.href = "/administrator/companies/";
    } else {
      alert("Something went wrong");
    }
  })
  .catch(err => console.error("Save failed:", err));
});



  loadCountries();
  document.getElementById("country").addEventListener("change", function() {
  const selectedId = this.value;
  if (!selectedId) return;

  fetch(`/countries/`, {
    method: "GET",
    headers: {"Content-Type": "application/json"},
  })
  .then(res => res.json())
  .then(data => {
    const selectedCountry = data.data.find(c => c.id == selectedId);
    if (selectedCountry && selectedCountry.calling_code) {
      document.getElementById("countryCode").value = selectedCountry.calling_code;
    }
  });
});
});
</script>
{% endblock %}
