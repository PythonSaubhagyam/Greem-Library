{% extends layout_path %}
{% load static %}
{% block title %} Add Company {% endblock %}

{% block page_css %}
<style>
  /* Page Background */
  body {
    background-color: #f8f9fa;
  }

  /* Full-page container */
  .add-company-page {
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-height: calc(100vh - 100px);
  }

  /* Card styling */
  .company-card {
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
  }

  /* Form Controls */
  .company-card .form-control,
  .company-card .form-select {
    height: 48px;
    border-radius: 6px;
    font-size: 0.95rem;
  }

  .company-card .btn {
    height: 48px;
    border-radius: 6px;
    font-weight: 500;
  }

  .company-card .form-control:focus {
    border-color: #3b82f6;
    box-shadow: none;
  }

  .company-card .form-control::placeholder {
    color: #999;
  }

  /* Password eye icon */
  .toggle-icon {
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    color: #888;
    cursor: pointer;
  }

  @media (min-width: 768px) {
    .company-card {
      width: 100%;
      max-width: 900px;
      margin: auto;
    }
  }
  .password-field.hidden {
  display: none;
}
</style>
{% endblock %}

{% block content %}
<div class="row">
  <!-- Basic Layout -->
  <div class="col-xxl">
    <div class="card mb-5">
      <div
        class="card-header d-flex align-items-center justify-content-between p-p-b"
      >
        <h5 class="mb-0" id="pageTitle">Add New Parent</h5>
      </div>
      <div class="card-body">
        <form id="companySignupForm">

          <input type="hidden" id="userId">

          <input type="hidden" id="roleType">


          <div class="row g-3">
            <div class="col-md-6">
               <label class="form-label">First Name</label>
              <input type="text" id="companyName" class="form-control" required>
            </div>

            <div class="col-md-6">
              <label class="form-label">Last Name</label>
              <input type="text" id="last_name" class="form-control" required>
            </div>

            <div class="col-md-6">
              <label class="form-label">Email</label>
              <input type="email" id="email" class="form-control"  required>
            </div>

            <div class="col-md-6">
              <label class="form-label">Mobile No.</label>
              <div class="d-flex gap-2">
                <select class="form-select" id="countryCode" style="max-width: 110px;">
                  <option value="91">+91</option>
                  <option value="1">+1</option>
                  <option value="44">+44</option>
                </select>

                <input type="text" id="mobile" class="form-control" placeholder="Enter mobile number" required>
              </div>
            </div>

            <div class="col-md-6">
              <label class="form-label">Password</label>
              <div class="input-group">
                <input type="password" id="password" class="form-control">
                <span class="input-group-text">
                  <i class="bx bx-show" id="togglePassword"></i>
                </span>
              </div>
            </div>

            <div class="col-md-6">
              <label class="form-label">Confirm Password</label>
              <div class="input-group">
                <input type="password" id="confirmPassword" class="form-control">
                <span class="input-group-text">
                  <i class="bx bx-show" id="toggleConfirmPassword"></i>
                </span>
              </div>
            </div>


            <div class="col-md-6">
              <label class="form-label">Address</label>
              <input type="text" id="address" class="form-control" >
            </div>

            <div class="col-md-6">
              <label class="form-label">Country</label>
              <select id="country" class="form-select" >
                <option value="">Select Country</option>
                {% comment %} <option value='India'>India</opiton> {% endcomment %}
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label">State</label>
              <select id="state" class="form-select" >
                <option value="">Select State</option>
                {% comment %} <option value='Gujarat'>Gujarat</opiton> {% endcomment %}
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label">City</label>
              <select id="city" class="form-select">
                <option value="">Select City</option>
                {% comment %} <option value='Ahmedabad'>Ahmedabad</opiton> {% endcomment %}
              </select>
            </div> 

            <div class="col-md-6">
              <label class="form-label">Zip Code</label>
              <input type="text" id="zipCode" class="form-control" >
            </div>

            <div class="col-12 d-flex justify-content-end mt-3">
              <button type="submit" class="btn btn-primary btn me-2" id="submitBtn">Add</button>
              <button type="button" class="btn btn-secondary btn" onclick="window.location.href='/administrator/users/?type={{detail_name}}'; return false;">Cancel</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block page_js %}
<script>

function showToast(title, message, status = "primary") {
    const toast = document.getElementById("alert-box");
    const toastTitle = document.getElementById("toast-title");
    const toastBody = document.getElementById("toast-body");
    const toastIcon = document.getElementById("toast-icon");

    toast.className = `bs-toast toast bg-${status} toast-placement-ex top-0 end-0 m-2 show`;
    toastTitle.textContent = title;
    toastBody.textContent = message;

    toastIcon.className = `bx me-2 ${status === "success" ? "bx-check-circle" : "bx-error"}`;

    const bsToast = new bootstrap.Toast(toast);
    bsToast.show();
}
document.addEventListener("DOMContentLoaded", function () {

  const csrftoken = document.querySelector('[name=csrfmiddlewaretoken]')?.value;
  const urlParams = new URLSearchParams(window.location.search);
  const roleType = urlParams.get("type");
  const pathParts = window.location.pathname.split("/").filter(Boolean);
  const editUserId = pathParts.includes("edit") ? pathParts[pathParts.length - 1] : null;

  const pageTitle = document.getElementById("pageTitle");
  const submitBtn = document.getElementById("submitBtn");

  /* ---------------- PAGE MODE ---------------- */
{% comment %} 
  if (!editUserId) {
    if (roleType === "parent") pageTitle.innerText = "Add Parent";
    if (roleType === "teacher") pageTitle.innerText = "Add Teacher";
  } else {
    submitBtn.innerText = "Update";

    if (roleType === "parent") pageTitle.innerText = "Update Parent";
    if (roleType === "teacher") pageTitle.innerText = "Update Teacher";

    document.querySelectorAll(".password-field").forEach(el => {
    el.classList.add("hidden");

    const input = el.querySelector("input");
    if (input) {
      input.required = false;
      input.disabled = true;
    }
  });
    loadUserForEdit(editUserId);
  } {% endcomment %}

  function setPageTitle(mode, type) {
    const label = type === "teacher" ? "Teacher" : "Parent";
    pageTitle.innerText = mode === "edit" ? `Update ${label}` : `Add ${label}`;
    submitBtn.innerText = mode === "edit" ? "Update" : "Add";
  }

  if (editUserId) {
    setPageTitle("edit", roleType);
    loadUserForEdit(editUserId);
  } else {
    setPageTitle("add", roleType);
  }

  /* ---------------- PASSWORD TOGGLE ---------------- */

  function toggleVisibility(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon = document.getElementById(iconId);
    if (!input || !icon) return;

    icon.addEventListener("click", () => {
      input.type = input.type === "password" ? "text" : "password";
      icon.classList.toggle("bx-show");
      icon.classList.toggle("bx-hide");
    });
  }

  toggleVisibility("password", "togglePassword");
  toggleVisibility("confirmPassword", "toggleConfirmPassword");

  /* ---------------- LOAD COUNTRIES ---------------- */

  function loadCountries() {
    fetch("/administrator/countries/")
      .then(res => res.json())
      .then(data => {
        const countrySelect = document.getElementById("country");
        const countryCodeSelect = document.getElementById("countryCode");

        countrySelect.innerHTML = `<option value="">Select Country</option>`;
        countryCodeSelect.innerHTML = `<option value="">Code</option>`;

        data.data.forEach(c => {
          countrySelect.innerHTML += `<option value="${c.id}">${c.country_name}</option>`;
          if (c.calling_code) {
            const selected = c.calling_code === "91" ? "selected" : "";
            countryCodeSelect.innerHTML += `<option value="${c.calling_code}" ${selected}>+${c.calling_code}</option>`;
          }
        });
      });
  }

  loadCountries();

  document.getElementById("country").addEventListener("change", function () {
    fetch(`/administrator/states/${this.value}/`)
      .then(res => res.json())
      .then(data => {
        const state = document.getElementById("state");
        state.innerHTML = `<option value="">Select State</option>`;
        data.data.forEach(s => state.innerHTML += `<option value="${s.id}">${s.name}</option>`);
      });
  });

  document.getElementById("state").addEventListener("change", function () {
    fetch(`/administrator/cities/${this.value}/`)
      .then(res => res.json())
      .then(data => {
        const city = document.getElementById("city");
        city.innerHTML = `<option value="">Select City</option>`;
        data.data.forEach(c => city.innerHTML += `<option value="${c.id}">${c.name}</option>`);
      });
  });

  function prefillLocation(countryId, stateId, cityId) {
  if (!countryId) return;   // 🔥 stop if nothing saved

  const waitForCountries = setInterval(() => {
    const countrySelect = document.getElementById("country");

    if (countrySelect.options.length > 1) {
      clearInterval(waitForCountries);
      countrySelect.value = countryId || "";

      fetch(`/administrator/states/${countryId}/`)
        .then(res => res.json())
        .then(data => {
          const stateSelect = document.getElementById("state");
          stateSelect.innerHTML = `<option value="">Select State</option>`;
          data.data.forEach(s => {
            stateSelect.innerHTML += `<option value="${s.id}">${s.name}</option>`;
          });

          if (!stateId) return;
          stateSelect.value = stateId;

          fetch(`/administrator/cities/${stateId}/`)
            .then(res => res.json())
            .then(data => {
              const citySelect = document.getElementById("city");
              citySelect.innerHTML = `<option value="">Select City</option>`;
              data.data.forEach(c => {
                citySelect.innerHTML += `<option value="${c.id}">${c.name}</option>`;
              });

              if (cityId) citySelect.value = cityId;
            });
        });
    }
  }, 100);
}

  /* ---------------- LOAD USER ---------------- */

  function loadUserForEdit(id) {
    fetch(`/administrator/users-list/?id=${id}`)
      .then(res => res.json())
      .then(data => {
        const user = data.results[0];

        if (!roleType && user.role_type) {
          if (user.role_type === "parent") pageTitle.innerText = "Update Parent";
          if (user.role_type === "teacher") pageTitle.innerText = "Update Teacher";
        }
        
        document.getElementById("userId").value = user.id;
        document.getElementById("companyName").value = user.first_name;
        document.getElementById("last_name").value = user.last_name;
        document.getElementById("email").value = user.email;
        document.getElementById("address").value = user.address || "";
        document.getElementById("zipCode").value = user.postal_code || "";  

        document.getElementById("mobile").value = user.phone_no || "";
        document.getElementById("countryCode").value = user.country_code || "91";


      setTimeout(() => {
        prefillLocation(user.country_id, user.state_id, user.city_id);
      }, 300);
      });
  }

  /* ---------------- FORM SUBMIT ---------------- */

  document.getElementById("companySignupForm").addEventListener("submit", function (e) {
    e.preventDefault();

    const userId = document.getElementById("userId").value;
    const countryCode = document.getElementById("countryCode").value;
    const mobile = document.getElementById("mobile").value.trim();
    

    const fullMobile = countryCode ? `+${countryCode}${mobile}` : mobile;

    const payload = {
      first_name: document.getElementById("companyName").value.trim(),
      last_name: document.getElementById("last_name").value.trim(),
      email: document.getElementById("email").value.trim(),
      mobile_no: fullMobile,
      address: document.getElementById("address").value.trim(),
      country: document.getElementById("country").value || null,
      state: document.getElementById("state").value || null,
      city: document.getElementById("city").value || null,
      postal_code: document.getElementById("zipCode").value || null,
      is_active: true
    };

    const password = document.getElementById("password").value;


    if (!userId) {
      payload.role_type = roleType;
    }

    if (password) {
      payload.password = document.getElementById("password").value;
      payload.confirm_password = document.getElementById("confirmPassword").value;
    }

    fetch(userId ? `/administrator/users-list/${userId}/` : `/administrator/users-list/`, {
      method: userId ? "PATCH" : "POST",
      headers: { "Content-Type": "application/json", "X-CSRFToken": csrftoken },
      body: JSON.stringify(payload)
    })
    .then(res => res.json())
    .then(data => {
      if (data.message) {
        const type = roleType ? `?type=${roleType}` : "";

        const roleLabel = roleType === "parent" ? "Parent" : "Teacher";
        const msg = userId
          ? `${roleLabel} updated successfully`
          : `${roleLabel} created successfully`;

        showToast("Success", msg, "success");

        setTimeout(() => {
          window.location.href = `/administrator/users/${type}`;
        }, 1200);
      } else {
        {% comment %} alert(data.error || "Save failed"); {% endcomment %}
        let errorMsg = "Something went wrong";

        if (data.errors) {
          const firstField = Object.keys(data.errors)[0];
          if (data.errors[firstField]?.length) {
            errorMsg = data.errors[firstField][0];
          }
        } else if (data.error) {
          errorMsg = data.error;
        }

        showToast("Error", errorMsg, "danger");

      }
    });
  });

});
</script>

{% endblock %}
