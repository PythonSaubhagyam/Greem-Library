{% extends layout_path %}
{% load static %}
{% block title %} Students {% endblock %}

{% block page_css %}
<style>
.table td, .table th { vertical-align: middle; }
</style>
{% endblock %}

{% block content %}

<div class="card">

  <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
    <h5 class="mb-0">Students
        <span class="text-bold ms-1" id="datacount"></span>
    </h5>

    <div class="d-flex gap-2 align-items-center">
      <div class="input-group input-group-sm" style="width: 220px;">
        <span class="input-group-text bg-white border-end-0">
          <i class="bx bx-search text-muted"></i>
        </span>
        <input type="text" id="searchStudent" class="form-control border-start-0" placeholder="Search student...">
      </div>

      <button class="btn btn-sm btn-outline-secondary" id="resetFilters">
        <i class="bx bx-refresh me-1"></i> Reset
      </button>

      <!-- NO Add Student button for school/customer role -->
    </div>
  </div>

  <div class="card-body">

    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead class="table-light">
          <tr>
            <th>Sr</th>
            <th>Name</th>
            <th>IMEI Number</th>
            <th>Email</th>
            <th>Class</th>
            <th>Parents</th>
            <th>Teachers</th>
            <th width="120px">Action</th>
          </tr>
        </thead>
        <tbody id="students-container"></tbody>
      </table>

      <div id="students-loader" class="text-center py-5">
        <div class="spinner-border text-primary"></div>
      </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mt-3 flex-wrap gap-2">
      <div class="d-flex align-items-center gap-2">
        <label class="small mb-0">Rows per page:</label>
        <select id="rowsPerPage" class="form-select form-select-sm w-auto">
          <option>10</option>
          <option>25</option>
          <option selected>50</option>
        </select>
      </div>

      <div class="d-flex align-items-center gap-3">
        <small id="pagination-info" class="text-muted"></small>
        <ul id="pagination" class="pagination pagination-sm mb-0"></ul>
      </div>
    </div>

  </div>
</div>

{% endblock %}

{% block page_js %}
<script>
const container = document.getElementById("students-container");
const loader    = document.getElementById("students-loader");
const search    = document.getElementById("searchStudent");
const rowsSelect = document.getElementById("rowsPerPage");
const paginationEl   = document.getElementById("pagination");
const paginationInfo = document.getElementById("pagination-info");

let currentPage = 1;

// ✅ CSRF token helper (needed for session auth)
function getCsrf() {
  const match = document.cookie.match(/csrftoken=([^;]+)/);
  return match ? match[1] : '';
}

// ✅ Always use school-students-api for this template
const BASE_API = '/administrator/school-students-api/';

function fetchStudents(page = 1) {
  const q    = search.value;
  const rows = rowsSelect.value;

  loader.style.display = "block";
  container.innerHTML  = "";

  fetch(
    `${BASE_API}?q=${encodeURIComponent(q)}&page=${page}&row_per_page=${rows}`,
    {
      credentials: 'same-origin',          // ✅ sends Django session cookie
      headers: {
        'X-CSRFToken': getCsrf(),          // ✅ CSRF header
        'Content-Type': 'application/json'
      }
    }
  )
    .then(res => {
      if (res.status === 401 || res.status === 403) {
        container.innerHTML = `<tr><td colspan="8" class="text-center text-danger">Session expired. Please <a href="/login/">log in again</a>.</td></tr>`;
        loader.style.display = "none";
        throw new Error("Unauthorized");
      }
      return res.json();
    })
    .then(res => {
      loader.style.display = "none";
      currentPage = res.current_page;

      const countEl = document.getElementById("datacount");
      if (countEl) countEl.innerText = `(${res.count})`;

      if (!res.results || !res.results.length) {
        container.innerHTML = `<tr><td colspan="8" class="text-center">No students found</td></tr>`;
        paginationEl.innerHTML   = "";
        paginationInfo.innerHTML = "";
        return;
      }

      renderRows(res.results);
      renderPagination(res);
    })
    .catch(err => {
      if (err.message !== "Unauthorized") {
        loader.style.display = "none";
        container.innerHTML = `<tr><td colspan="8" class="text-center text-danger">Failed to load students.</td></tr>`;
      }
    });
}

function renderRows(data) {
  container.innerHTML = "";
  data.forEach((s, i) => {
    // parent_name may be array or string
    const parentName  = Array.isArray(s.parent_name)  ? (s.parent_name.join(', ')  || '-') : (s.parent_name  || '-');
    const teacherName = Array.isArray(s.teacher_name) ? (s.teacher_name.join(', ') || '-') : (s.teacher_name || '-');

    container.insertAdjacentHTML("beforeend", `
      <tr>
        <td>${(currentPage - 1) * parseInt(rowsSelect.value) + i + 1}</td>
        <td>${s.student_name}</td>
        <td>${s.device_imei_number || '-'}</td>
        <td>${s.email || '-'}</td>
        <td>${s.student_class || '-'}</td>
        <td>${parentName}</td>
        <td>${teacherName}</td>
        <td>
          <div class="d-flex gap-2 align-items-center">
            <!-- VIEW DETAILS only — no edit/delete for school role -->
            <a href="/customer/dashboard/students/detail/${s.id}/"
               class="btn btn-sm btn-icon btn-label-primary" title="View Details">
              <i class="bx bx-show"></i>
            </a>
          </div>
        </td>
      </tr>
    `);
  });
}

function renderPagination(data) {
  paginationEl.innerHTML = "";
  paginationInfo.textContent = `Showing page ${data.current_page} of ${data.total_pages} (${data.count} Students)`;

  const prevDisabled = data.previous === null ? "disabled" : "";
  paginationEl.insertAdjacentHTML("beforeend",
    `<li class="page-item ${prevDisabled}">
      <a class="page-link" href="#" data-page="${data.current_page - 1}">Previous</a>
    </li>`);

  for (let i = 1; i <= data.total_pages; i++) {
    const active = i === data.current_page ? "active" : "";
    paginationEl.insertAdjacentHTML("beforeend",
      `<li class="page-item ${active}">
        <a class="page-link" href="#" data-page="${i}">${i}</a>
      </li>`);
  }

  const nextDisabled = data.next === null ? "disabled" : "";
  paginationEl.insertAdjacentHTML("beforeend",
    `<li class="page-item ${nextDisabled}">
      <a class="page-link" href="#" data-page="${data.current_page + 1}">Next</a>
    </li>`);

  paginationEl.querySelectorAll(".page-link").forEach(btn => {
    btn.addEventListener("click", e => {
      e.preventDefault();
      const page = parseInt(btn.dataset.page);
      if (!isNaN(page) && page >= 1 && page <= data.total_pages) {
        fetchStudents(page);
      }
    });
  });
}

search.addEventListener("input", () => fetchStudents(1));
rowsSelect.addEventListener("change", () => fetchStudents(1));
document.getElementById("resetFilters").onclick = () => {
  search.value = "";
  fetchStudents(1);
};

fetchStudents();
</script>
{% endblock %}
