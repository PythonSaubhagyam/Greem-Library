{% extends layout_path %}
{% load static %}

{% block title %}Escalations{% endblock %}

{% block content %}
<div class="container-xxl flex-grow-1 container-p-y">

  <div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
      <h5 class="mb-0">
        <i class="bx bx-up-arrow-circle me-2 text-danger"></i>All Escalations
      </h5>
      <button class="btn btn-primary btn-sm" onclick="openAddModal()">
        <i class="bx bx-plus me-1"></i>New Escalation
      </button>
    </div>

    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light text-capitalize">
          <tr>
            <th>Sr</th>
            <th>Title</th>
            <th>Student</th>
            <th>Teacher</th>
            <th>Priority</th>
            <th>Status</th>
            <th>Created</th>
            <th>Resolved</th>
            <th class="text-center">Action</th>
          </tr>
        </thead>
        <tbody id="escalations-tbody">
          <tr><td colspan="9" class="text-center py-4">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<!-- Add Modal -->
<div class="modal fade" id="addEscalationModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title"><i class="bx bx-plus me-2"></i>New Escalation</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label fw-semibold">Title <span class="text-danger">*</span></label>
          <input type="text" id="add-title" class="form-control" placeholder="Escalation title">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Description</label>
          <textarea id="add-description" class="form-control" rows="3"></textarea>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Priority</label>
          <select id="add-priority" class="form-select">
            <option value="High">High</option>
            <option value="Medium" selected>Medium</option>
            <option value="Low">Low</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary" onclick="submitAdd()">Create Escalation</button>
      </div>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal fade" id="editEscalationModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title"><i class="bx bx-edit me-2"></i>Update Escalation</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="edit-id">
        <div class="mb-3">
          <label class="form-label fw-semibold">Status</label>
          <select id="edit-status" class="form-select">
            <option value="Open">Open</option>
            <option value="In Progress">In Progress</option>
            <option value="Resolved">Resolved</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Priority</label>
          <select id="edit-priority" class="form-select">
            <option value="High">High</option>
            <option value="Medium">Medium</option>
            <option value="Low">Low</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Description</label>
          <textarea id="edit-description" class="form-control" rows="3"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary text-white" onclick="submitEdit()">Save Changes</button>
      </div>
    </div>
  </div>
</div>

<!-- Delete Modal -->
<div class="modal fade" id="deleteEscalationModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title"><i class="bx bx-trash me-2"></i>Delete</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body text-center py-4">
        <i class="bx bx-error-circle text-danger" style="font-size:3rem;"></i>
        <p class="mt-3 fw-semibold">Delete this escalation?</p>
        <input type="hidden" id="delete-id">
      </div>
      <div class="modal-footer justify-content-center">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-danger" onclick="confirmDelete()">Delete</button>
      </div>
    </div>
  </div>
</div>

<script>
let allEscalations = [];

document.addEventListener('DOMContentLoaded', loadEscalations);

function loadEscalations(){
    fetch("{% url 'coordinator-escalation-api' %}")
    .then(r => r.json())
    .then(data => {
        allEscalations = data.escalations || [];
        renderEscalations(allEscalations);
    })
    .catch(() => {
        document.getElementById('escalations-tbody').innerHTML =
            `<tr><td colspan="9" class="text-center text-danger py-4">Failed to load</td></tr>`;
    });
}

function renderEscalations(items){
    const tbody = document.getElementById('escalations-tbody');
    if(!items.length){
        tbody.innerHTML = `<tr><td colspan="9" class="text-center py-5 text-muted">No escalations found</td></tr>`;
        return;
    }
    const pc = { High:'danger', Medium:'warning', Low:'success' };
    const sc = { Open:'danger', 'In Progress':'info', Resolved:'success' };
    tbody.innerHTML = items.map((e, i) => `<tr>
        <td>${i+1}</td>
        <td><strong>${e.title}</strong></td>
        <td>${e.student}</td>
        <td>${e.teacher}</td>
        <td><span class="badge bg-${pc[e.priority]||'secondary'}">${e.priority}</span></td>
        <td><span class="badge bg-label-${sc[e.status]||'secondary'}">${e.status}</span></td>
        <td><small>${e.created_at}</small></td>
        <td><small>${e.resolved_at}</small></td>
        <td class="text-center">
            <div class="d-inline-flex gap-1">
                <button class="btn btn-sm btn-icon btn-label-warning" title="Edit"
                        onclick="openEditModal(${e.id}, '${e.status}', '${e.priority}', \`${e.description}\`)">
                    <i class="bx bx-edit"></i>
                </button>
                <button class="btn btn-sm btn-icon btn-label-danger" title="Delete"
                        onclick="openDeleteModal(${e.id})">
                    <i class="bx bx-trash"></i>
                </button>
            </div>
        </td>
    </tr>`).join('');
}

function openAddModal(){
    document.getElementById('add-title').value       = '';
    document.getElementById('add-description').value = '';
    document.getElementById('add-priority').value    = 'Medium';
    new bootstrap.Modal(document.getElementById('addEscalationModal')).show();
}

function submitAdd(){
    const title       = document.getElementById('add-title').value.trim();
    const description = document.getElementById('add-description').value.trim();
    const priority    = document.getElementById('add-priority').value;
    if(!title){ alert('Title required'); return; }

    fetch("{% url 'coordinator-escalation-api' %}", {
        method: 'POST',
        headers: {'Content-Type':'application/json','X-CSRFToken':getCookie('csrftoken')},
        body: JSON.stringify({ title, description, priority })
    })
    .then(r => r.json())
    .then(data => {
        if(data.success){
            bootstrap.Modal.getInstance(document.getElementById('addEscalationModal')).hide();
            loadEscalations();
        } else {
            alert('Error: ' + (data.error || 'Failed'));
        }
    });
}

function openEditModal(id, status, priority, description){
    document.getElementById('edit-id').value          = id;
    document.getElementById('edit-status').value      = status;
    document.getElementById('edit-priority').value    = priority;
    document.getElementById('edit-description').value = description;
    new bootstrap.Modal(document.getElementById('editEscalationModal')).show();
}

function submitEdit(){
    const id          = document.getElementById('edit-id').value;
    const status      = document.getElementById('edit-status').value;
    const priority    = document.getElementById('edit-priority').value;
    const description = document.getElementById('edit-description').value;

    fetch(`/coordinator/api/escalations/${id}/`, {
        method: 'PUT',
        headers: {'Content-Type':'application/json','X-CSRFToken':getCookie('csrftoken')},
        body: JSON.stringify({ status, priority, description })
    })
    .then(r => r.json())
    .then(data => {
        if(data.success){
            bootstrap.Modal.getInstance(document.getElementById('editEscalationModal')).hide();
            loadEscalations();
        }
    });
}

function openDeleteModal(id){
    document.getElementById('delete-id').value = id;
    new bootstrap.Modal(document.getElementById('deleteEscalationModal')).show();
}

function confirmDelete(){
    const id = document.getElementById('delete-id').value;
    fetch(`/coordinator/api/escalations/${id}/`, {
        method: 'DELETE',
        headers: {'X-CSRFToken': getCookie('csrftoken')}
    })
    .then(r => r.json())
    .then(data => {
        bootstrap.Modal.getInstance(document.getElementById('deleteEscalationModal')).hide();
        if(data.success) loadEscalations();
    });
}

function getCookie(name){
    let v = document.cookie.match('(^|;) ?' + name + '=([^;]*)(;|$)');
    return v ? v[2] : null;
}
</script>
{% endblock %}
