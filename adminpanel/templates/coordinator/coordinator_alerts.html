{% extends layout_path %}
{% load static %}
{% block title %}Alerts — Coordinator{% endblock %}
{% block content %}
<div class="container-xxl flex-grow-1 container-p-y">

  <div class="d-flex justify-content-end align-items-end mb-4">
    <button class="btn btn-outline-secondary btn-sm" onclick="loadAlerts()">
      <i class="ti ti-refresh me-1"></i>Refresh
    </button>
  </div>

  <!-- Summary Cards -->
  <div class="row g-3 mb-4">
    <div class="col-6 col-md-3">
      <div class="card text-center border-0 shadow-sm">
        <div class="card-body py-3">
          <h3 class="mb-0 text-primary" id="totalAlerts">—</h3>
          <small class="text-muted">Total Alerts</small>
        </div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card text-center border-0 shadow-sm">
        <div class="card-body py-3">
          <h3 class="mb-0 text-danger" id="highAlerts">—</h3>
          <small class="text-muted">High Priority</small>
        </div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card text-center border-0 shadow-sm">
        <div class="card-body py-3">
          <h3 class="mb-0 text-warning" id="medAlerts">—</h3>
          <small class="text-muted">Medium Priority</small>
        </div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card text-center border-0 shadow-sm">
        <div class="card-body py-3">
          <h3 class="mb-0 text-secondary" id="lowAlerts">—</h3>
          <small class="text-muted">Low Priority</small>
        </div>
      </div>
    </div>
  </div>

  <!-- Filter Bar -->
  <div class="card mb-4 shadow-sm">
    <div class="card-body py-2">
      <div class="row g-2 align-items-center">
        <div class="col-12 col-md-3">
          <input type="text" id="f-search" class="form-control form-control-sm"
                 placeholder="Search message…" oninput="filterAlerts()">
        </div>
        <div class="col-6 col-md-2">
          <select id="f-priority" class="form-select form-select-sm" onchange="filterAlerts()">
            <option value="">All priorities</option>
            <option value="High">High</option>
            <option value="Medium">Medium</option>
            <option value="Low">Low</option>
          </select>
        </div>
        <div class="col-6 col-md-3">
          <select id="f-type" class="form-select form-select-sm" onchange="filterAlerts()">
            <option value="">All alert types</option>
            <option value="Student Inactive">Student Inactive</option>
            <option value="Low Score">Low Score</option>
            <option value="Homework Pending">Homework Pending</option>
            <option value="Teacher No Test">Teacher No Test</option>
            <option value="Teacher Inactive">Teacher Inactive</option>
            <option value="Overdue Actions">Overdue Actions</option>
            <option value="Class Avg Dropped">Class Avg Dropped</option>
            <option value="Tablet Not Synced">Tablet Not Synced</option>
            <option value="HW Not Checked">HW Not Checked</option>
          </select>
        </div>
        <div class="col-6 col-md-2">
          <select id="f-class" class="form-select form-select-sm" onchange="filterAlerts()">
            <option value="">All classes</option>
          </select>
        </div>
        <div class="col-6 col-md-2">
          <button class="btn btn-outline-secondary btn-sm w-100" onclick="resetFilters()">
            <i class="ti ti-x me-1"></i>Reset
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Alert Type Breakdown Badges -->
  <div class="d-flex flex-wrap gap-2 mb-3" id="typeBadges"></div>

  <!-- Alerts Table -->
  <div class="card shadow-sm">
    <div class="card-header d-flex justify-content-between align-items-center">
      <h5 class="mb-0">All Alerts</h5>
      <span class="badge bg-label-primary" id="showingCount">Loading…</span>
    </div>
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th style="width:90px">Priority</th>
              <th style="width:160px">Type</th>
              <th>Message</th>
              <th>Class</th>
              <th>Responsible</th>
              <th>Date</th>
              <th>Status</th>
              <th style="width:110px">Action</th>
            </tr>
          </thead>
          <tbody id="alertsBody">
            <tr>
              <td colspan="8" class="text-center py-5">
                <div class="spinner-border text-primary"></div>
                <div class="mt-2 text-muted small">Loading alerts…</div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<script>
// ── BUG FIX: switched from /api/alerts/ to /api/alerts/all/ ──────────────────
// Old endpoint only had 5 alert types.
// New endpoint has all 9 types from spec §17:
//   1. Student Inactive 3+ days
//   2. Low Score (avg < 40%)
//   3. Homework Pending > 50%
//   4. Teacher No Test for 7 days
//   5. Overdue Coordinator Actions
//   6. Teacher Inactive 2+ days      ← NEW
//   7. Class Avg Dropped             ← NEW
//   8. Tablet Not Synced             ← NEW
//   9. HW Not Checked by Teacher     ← NEW
// ─────────────────────────────────────────────────────────────────────────────

let allAlerts = [];

const priorityConfig = {
  High:   { badge: 'bg-danger',             icon: 'ti-alert-circle',    dot: '#dc3545' },
  Medium: { badge: 'bg-warning text-dark',   icon: 'ti-alert-triangle',  dot: '#ffc107' },
  Low:    { badge: 'bg-secondary',           icon: 'ti-info-circle',     dot: '#6c757d' },
};

const typeIcon = {
  'Student Inactive':  'ti-user-off',
  'Low Score':         'ti-trending-down',
  'Homework Pending':  'ti-notebook',
  'Teacher No Test':   'ti-file-x',
  'Teacher Inactive':  'ti-user-pause',
  'Overdue Actions':   'ti-clock-exclamation',
  'Class Avg Dropped': 'ti-chart-arrows-vertical',
  'Tablet Not Synced': 'ti-device-tablet-off',
  'HW Not Checked':    'ti-checkbox',
};

function prioBadge(p) {
  const c = priorityConfig[p] || { badge: 'bg-secondary', icon: 'ti-bell' };
  return `<span class="badge ${c.badge}"><i class="ti ${c.icon} me-1"></i>${p}</span>`;
}

function statusBadge(s) {
  const map = {
    New:      'bg-label-primary',
    Pending:  'bg-label-warning',
    Overdue:  'bg-label-danger',
    Resolved: 'bg-label-success',
  };
  return `<span class="badge ${map[s] || 'bg-label-secondary'}">${s}</span>`;
}

async function loadAlerts() {
  document.getElementById('showingCount').textContent = 'Loading…';
  document.getElementById('alertsBody').innerHTML = `
    <tr><td colspan="8" class="text-center py-5">
      <div class="spinner-border text-primary"></div>
      <div class="mt-2 text-muted small">Fetching all 9 alert types…</div>
    </td></tr>`;

  // ── KEY FIX: use /api/alerts/all/ not /api/alerts/ ──
  const res  = await fetch("{% url 'coordinator-alerts-all-api' %}");
  const data = await res.json();
  allAlerts  = data.alerts || [];

  updateSummary(allAlerts);
  buildTypeBadges(allAlerts);
  populateClassFilter(allAlerts);
  renderAlerts(allAlerts);
}

function updateSummary(list) {
  document.getElementById('totalAlerts').textContent = list.length;
  document.getElementById('highAlerts').textContent  = list.filter(a => a.priority === 'High').length;
  document.getElementById('medAlerts').textContent   = list.filter(a => a.priority === 'Medium').length;
  document.getElementById('lowAlerts').textContent   = list.filter(a => a.priority === 'Low').length;
}

function buildTypeBadges(list) {
  const counts = {};
  list.forEach(a => { counts[a.type] = (counts[a.type] || 0) + 1; });
  document.getElementById('typeBadges').innerHTML = Object.entries(counts)
    .sort((a, b) => b[1] - a[1])
    .map(([type, cnt]) => `
      <button class="btn btn-sm btn-outline-secondary" onclick="filterByType('${type}')">
        <i class="ti ${typeIcon[type] || 'ti-bell'} me-1"></i>${type}
        <span class="badge bg-secondary ms-1">${cnt}</span>
      </button>
    `).join('');
}

function populateClassFilter(list) {
  const classes = [...new Set(list.map(a => a.class).filter(c => c && c !== '-'))].sort();
  const sel = document.getElementById('f-class');
  // keep first option
  while (sel.options.length > 1) sel.remove(1);
  classes.forEach(c => {
    const o = document.createElement('option');
    o.value = c; o.textContent = c;
    sel.appendChild(o);
  });
}

function filterByType(type) {
  document.getElementById('f-type').value = type;
  filterAlerts();
}

function filterAlerts() {
  const search = document.getElementById('f-search').value.toLowerCase();
  const prio   = document.getElementById('f-priority').value;
  const type   = document.getElementById('f-type').value;
  const cls    = document.getElementById('f-class').value;

  const filtered = allAlerts.filter(a => {
    if (prio && a.priority !== prio) return false;
    if (type && a.type !== type) return false;
    if (cls  && a.class !== cls)  return false;
    if (search && !a.message.toLowerCase().includes(search) &&
        !a.responsible.toLowerCase().includes(search) &&
        !a.type.toLowerCase().includes(search)) return false;
    return true;
  });

  renderAlerts(filtered);
}

function resetFilters() {
  document.getElementById('f-search').value   = '';
  document.getElementById('f-priority').value = '';
  document.getElementById('f-type').value     = '';
  document.getElementById('f-class').value    = '';
  renderAlerts(allAlerts);
}

function renderAlerts(list) {
  document.getElementById('showingCount').textContent = `${list.length} alert${list.length !== 1 ? 's' : ''}`;
  const tbody = document.getElementById('alertsBody');

  if (!list.length) {
    tbody.innerHTML = `
      <tr><td colspan="8" class="text-center py-5">
        <i class="ti ti-check-circle ti-lg text-success mb-2 d-block"></i>
        <span class="text-muted">No alerts match the current filter</span>
      </td></tr>`;
    return;
  }

  tbody.innerHTML = list.map((a, i) => `
    <tr class="${a.priority === 'High' ? 'table-danger bg-opacity-10' : a.priority === 'Medium' ? 'table-warning bg-opacity-10' : ''}">
      <td>${prioBadge(a.priority)}</td>
      <td>
        <span class="d-flex align-items-center gap-1">
          <i class="ti ${typeIcon[a.type] || 'ti-bell'} text-muted"></i>
          <small>${a.type}</small>
        </span>
      </td>
      <td>${a.message}</td>
      <td>${a.class !== '-' ? `<span class="badge bg-label-primary">${a.class}</span>` : '<span class="text-muted">—</span>'}</td>
      <td><small>${a.responsible}</small></td>
      <td><small class="text-muted">${a.date}</small></td>
      <td>${statusBadge(a.status)}</td>
      <td>
        <button class="btn btn-sm btn-outline-primary py-0 px-2 me-1"
                onclick="createAction(${i})" title="Create action">
          <i class="ti ti-plus"></i>
        </button>
        <button class="btn btn-sm btn-outline-success py-0 px-2"
                onclick="markResolved(${i})" title="Mark resolved">
          <i class="ti ti-check"></i>
        </button>
      </td>
    </tr>
  `).join('');
}

function createAction(index) {
  const a = allAlerts[index];
  if (!a) return;
  const msg = encodeURIComponent(`Alert: ${a.type} — ${a.message}`);
  window.location.href = `{% url 'coordinator-actions' %}?prefill=${msg}`;
}

function markResolved(index) {
  const a = allAlerts[index];
  if (!a) return;
  // Optimistic UI update
  a.status = 'Resolved';
  filterAlerts();
}

// Load on page open — uses new all-alerts endpoint
loadAlerts();
</script>
{% endblock %}
