{% extends layout_path %}
{% load static %}

{% block title %}My Classes{% endblock %}

{% block content %}
<div class="container-xxl flex-grow-1 container-p-y">

  <div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
      <h5 class="mb-0">
        <i class="bx bx-chalkboard me-2 text-primary"></i>My Assigned Classes
      </h5>
      <input type="text" id="search-class" class="form-control form-control-sm"
             placeholder="Search class..." style="width:200px;">
    </div>

    <div class="table-responsive">
      
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light text-capitalize">
          <tr>
            <th>Sr</th>
            <th>Class</th>
            <th>Students</th>
            <th>Avg Score</th>
            <th>Weak Students</th>
            <th>Homework</th>
            <th>Tests</th>
            <th>Study Time</th>
            <th>Status</th>
            <th class="text-center">Action</th>
          </tr>
        </thead>
        <tbody id="classes-tbody">
          <tr><td colspan="10" class="text-center py-4">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script>
let allClasses = [];

document.addEventListener('DOMContentLoaded', function(){
    fetch("{% url 'coordinator-class-comparison-api' %}")
    .then(r => r.json())
    .then(data => {
        allClasses = data.classes || [];
        renderClasses(allClasses);
    })
    .catch(() => {
        document.getElementById('classes-tbody').innerHTML =
            `<tr><td colspan="10" class="text-center text-danger py-4">Failed to load</td></tr>`;
    });
});

function renderClasses(items){
    const tbody = document.getElementById('classes-tbody');
    if(!items.length){
        tbody.innerHTML = `<tr><td colspan="10" class="text-center py-5 text-muted">No classes assigned</td></tr>`;
        return;
    }
    const sc = { Excellent:'success', Good:'primary', Average:'warning', Weak:'danger', Critical:'danger' };
    tbody.innerHTML = items.map((c, i) => `
    <tr>
        <td>${i+1}</td>
        <td><strong>${c.name}</strong></td>
        <td>${c.students || '-'}</td>
        <td><span class="fw-bold text-${c.avg_score < 40 ? 'danger' : c.avg_score < 60 ? 'warning' : 'success'}">${c.avg_score}%</span></td>
        <td><span class="badge bg-label-${c.weak_students > 0 ? 'danger' : 'success'}">${c.weak_students}</span></td>
        <td>${c.homework_completion ?? '-'}%</td>
        <td>${c.tests_taken ?? '-'}</td>
        <td>${c.study_time ?? '-'}</td>
        <td><span class="badge bg-${sc[c.status]||'secondary'}">${c.status}</span></td>
        <td class="text-center">
            <a href="/coordinator/classes/${c.id}/" class="btn btn-sm btn-icon btn-label-primary" title="View Detail">
                <i class="bx bx-show"></i>
            </a>
        </td>
    </tr>`).join('');
}

document.getElementById('search-class').addEventListener('input', function(){
    const q = this.value.toLowerCase();
    renderClasses(allClasses.filter(c => c.name.toLowerCase().includes(q)));
});
</script>
{% endblock %}
