{% extends layout_path %}
{% load static %}

{% block title %}Coordinator Dashboard{% endblock %}

{% block content %}
<div class="row">
  <div class="col-12 mb-4">
    <div class="card">
      <div class="card-body text-center">
        <h4>Welcome, {{ user.get_full_name|default:user.first_name|default:user.email }}!</h4>
        <p class="text-muted">You are logged in as a <strong>Coordinator</strong>.</p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
